<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Книга рецептов</title>
<style>
:root{
  --ink:#1a1a1a; --muted:#8a8a8a; --line:#ececec; --bg:#ffffff;
  --accent:#c2410c; --accent-soft:#fef0e9; --soft:#f7f6f4;
  --p:#d97706; --f:#dc2626; --c:#2563eb;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:90px}

/* ===== HEADER ===== */
.head{padding:30px 22px 16px}
.head .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);font-weight:700}
.head h1{font-size:30px;line-height:1.05;font-weight:800;letter-spacing:-.02em;margin:8px 0 0}
.head h1 .thin{font-weight:300;color:var(--muted)}

/* ===== TABS ===== */
.tabs{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);
  backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line);
  display:flex;gap:4px;padding:8px 14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 16px;border-radius:100px;font-size:14px;font-weight:600;
  color:var(--muted);white-space:nowrap;transition:.18s;border:1px solid transparent}
.tab.on{background:var(--ink);color:#fff}
.tab:not(.on):hover{background:var(--soft);color:var(--ink)}

.section{display:none;animation:fade .35s ease}
.section.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== INTRO ===== */
.intro{padding:14px 22px 4px;color:var(--muted);font-size:14px;line-height:1.5}

/* ===== GRID CARDS ===== */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 16px 8px}
@media(max-width:520px){.grid{gap:11px;padding:14px 12px}}
.card{border-radius:18px;overflow:hidden;background:#fff;border:1px solid var(--line);
  transition:.2s;display:flex;flex-direction:column}
.card:active{transform:scale(.985)}
.card .ph{aspect-ratio:1/1;overflow:hidden;background:var(--soft);position:relative}
.card .ph::after{content:"🍲";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px}
.card .ph img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1}
.card .body{padding:11px 12px 13px;display:flex;flex-direction:column;gap:7px;flex:1}
.card h3{font-size:13.5px;line-height:1.18;font-weight:700;margin:0;letter-spacing:-.01em;
  text-transform:uppercase}
.card .kc{margin-top:auto;display:flex;align-items:baseline;gap:6px}
.card .kc b{font-size:15px;font-weight:800}
.card .kc span{font-size:11px;color:var(--muted)}
.macros{display:flex;gap:9px;font-size:10.5px;color:var(--muted);font-weight:600}
.macros i{font-style:normal}
.macros .mp{color:var(--p)} .macros .mf{color:var(--f)} .macros .mc{color:var(--c)}
.add{margin-top:8px;width:100%;padding:8px;border-radius:10px;background:var(--soft);
  font-size:12.5px;font-weight:700;color:var(--ink);transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.add:hover{background:var(--accent-soft);color:var(--accent)}
.add.in{background:var(--accent);color:#fff}

/* ===== RATION ===== */
.daybar{padding:14px 16px 4px}
.daynav{display:flex;align-items:center;gap:12px;justify-content:center}
.daynav button{width:42px;height:42px;border-radius:50%;background:var(--soft);font-size:20px;
  display:flex;align-items:center;justify-content:center;transition:.15s;color:var(--ink)}
.daynav button:hover{background:var(--accent-soft);color:var(--accent)}
.daynav button:disabled{opacity:.3;pointer-events:none}
.daynav .dn{text-align:center;min-width:120px}
.daynav .dn .lab{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700}
.daynav .dn .num{font-size:26px;font-weight:800;line-height:1}
.dayscroll{display:flex;gap:7px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}
.dayscroll::-webkit-scrollbar{display:none}
.daypill{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--soft);
  font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s}
.daypill.on{background:var(--ink);color:#fff}

.daytotal{margin:10px 16px;padding:15px 18px;border-radius:18px;
  background:linear-gradient(135deg,#1a1a1a,#2e2e2e);color:#fff}
.daytotal .t1{font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.6;font-weight:700}
.daytotal .big{font-size:32px;font-weight:800;line-height:1.1;margin-top:3px}
.daytotal .big small{font-size:15px;opacity:.6;font-weight:600}
.daytotal .mac{display:flex;gap:18px;margin-top:12px}
.daytotal .mac div{font-size:13px}
.daytotal .mac b{display:block;font-size:18px;font-weight:800}
.daytotal .mac .lp{color:#fbbf6e} .daytotal .mac .lf{color:#fca5a5} .daytotal .mac .lc{color:#93c5fd}
.daytotal .mac span{opacity:.55;font-size:11px}

.meallist{padding:4px 16px 20px}
.mealcard{border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:14px}
.mealcard .mhead{display:flex;align-items:center;gap:12px;padding:13px 15px}
.mealcard .mtag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;
  color:var(--accent);background:var(--accent-soft);padding:5px 10px;border-radius:7px}
.mealcard .mt{flex:1}
.mealcard .mt h3{font-size:15px;font-weight:700;margin:0;text-transform:uppercase;letter-spacing:-.01em;line-height:1.15}
.mealcard .mk{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px}
.mealcard .chev{color:var(--muted);transition:.25s;font-size:13px}
.mealcard.open .chev{transform:rotate(90deg)}
.mealcard .mimg{aspect-ratio:16/10;overflow:hidden;background:var(--soft);display:none;position:relative}
.mealcard .mimg::after{content:"🥗";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px}
.mealcard .mimg img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1}
.mealcard .mbody{display:none;padding:0 16px 18px}
.mealcard.open .mimg,.mealcard.open .mbody{display:block}

.recipe-ing{margin:14px 0 4px}
.recipe-ing .h,.recipe-prep .h{font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);font-weight:700;margin-bottom:8px}
.recipe-ing ul{list-style:none;margin:0;padding:0}
.recipe-ing li{padding:6px 0;font-size:14.5px;line-height:1.4;border-bottom:1px solid var(--line);
  display:flex;gap:9px}
.recipe-ing li:before{content:"—";color:var(--accent);flex:0 0 auto}
.recipe-ing li:last-child{border-bottom:none}
.recipe-prep{margin-top:16px}
.recipe-prep p{font-size:14.5px;line-height:1.6;margin:0;color:#333}

/* ===== DETAIL MODAL ===== */
.modal{position:fixed;inset:0;z-index:80;display:none}
.modal.on{display:block}
.modal .ov{position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);animation:fade .25s}
.sheet{position:absolute;left:0;right:0;bottom:0;max-height:94vh;background:#fff;
  border-radius:26px 26px 0 0;overflow-y:auto;max-width:760px;margin:0 auto;animation:up .32s cubic-bezier(.16,1,.3,1)}
@workspace keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet .grab{position:sticky;top:0;background:#fff;padding:11px 0 4px;display:flex;justify-content:center;z-index:2}
.sheet .grab i{width:38px;height:4px;border-radius:3px;background:#ddd;display:block}
.sheet .close{position:absolute;top:14px;right:16px;z-index:3;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.85);backdrop-filter:blur(6px);font-size:20px;color:var(--ink);
  display:flex;align-items:center;justify-content:center}
.sheet .dimg{aspect-ratio:4/3;overflow:hidden;background:var(--soft);margin-top:-30px;position:relative}
.sheet .dimg::after{content:"🍽️";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px}
.sheet .dimg img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1}
.sheet .dbody{padding:20px 22px 40px}
.sheet h2{font-size:23px;font-weight:800;letter-spacing:-.02em;line-height:1.08;margin:0 0 14px;text-transform:uppercase}
.kbju{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.kbju .pill{flex:1;min-width:64px;text-align:center;padding:11px 6px;border-radius:13px;background:var(--soft)}
.kbju .pill b{display:block;font-size:19px;font-weight:800;line-height:1}
.kbju .pill span{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:4px;display:block}
.kbju .pill.kcal b{color:var(--accent)} .kbju .pill.pp b{color:var(--p)}
.kbju .pill.pf b{color:var(--f)} .kbju .pill.pc b{color:var(--c)}
.modaladd{width:100%;margin-top:14px;padding:14px;border-radius:14px;background:var(--ink);color:#fff;
  font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.modaladd.in{background:var(--accent)}

/* ===== BASKET BAR ===== */
.basketbar{position:fixed;left:0;right:0;bottom:0;z-index:60;max-width:760px;margin:0 auto;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
.basketbar .inner{background:rgba(26,26,26,.97);backdrop-filter:blur(10px);border-radius:18px;
  padding:12px 16px;display:flex;align-items:center;gap:14px;color:#fff;
  box-shadow:0 8px 30px rgba(0,0,0,.18);transform:translateY(150%);transition:.35s cubic-bezier(.16,1,.3,1)}
.basketbar.show .inner{transform:none}
.basketbar .bcount{font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.6;font-weight:700}
.basketbar .bk{font-size:22px;font-weight:800;line-height:1}
.basketbar .bk small{font-size:13px;opacity:.6}
.basketbar .bmac{display:flex;gap:11px;font-size:11px;font-weight:700;margin-top:3px}
.basketbar .bmac .bp{color:#fbbf6e}.basketbar .bmac .bf{color:#fca5a5}.basketbar .bmac .bc{color:#93c5fd}
.basketbar .bview{margin-left:auto;background:#fff;color:#1a1a1a;padding:10px 16px;border-radius:11px;font-size:13px;font-weight:700;flex:0 0 auto}

/* ===== BASKET MODAL ===== */
.bsheet .dbody{padding:8px 22px 30px}
.bsheet h2{margin:6px 0 16px}
.brow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.brow img{width:54px;height:54px;border-radius:11px;object-fit:cover;flex:0 0 auto;background:var(--soft)}
.brow .bi{flex:1;min-width:0}
.brow .bi h4{margin:0;font-size:13.5px;font-weight:700;text-transform:uppercase;line-height:1.15}
.brow .bi span{font-size:12px;color:var(--muted);font-weight:600}
.brow .rm{width:30px;height:30px;border-radius:50%;background:var(--soft);font-size:17px;color:var(--muted);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.brow .rm:hover{background:#fee;color:var(--f)}
.bsum{margin-top:18px;padding:18px;border-radius:18px;background:linear-gradient(135deg,#1a1a1a,#2e2e2e);color:#fff}
.bsum .t1{font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.6;font-weight:700}
.bsum .big{font-size:34px;font-weight:800;margin-top:3px}
.bsum .big small{font-size:15px;opacity:.6}
.bsum .mac{display:flex;gap:20px;margin-top:12px}
.bsum .mac b{display:block;font-size:19px;font-weight:800}
.bsum .mac .lp{color:#fbbf6e}.bsum .mac .lf{color:#fca5a5}.bsum .mac .lc{color:#93c5fd}
.bsum .mac span{opacity:.55;font-size:11px}
.bclear{width:100%;margin-top:14px;padding:13px;border-radius:13px;background:var(--soft);color:var(--muted);font-weight:700;font-size:14px}
.bempty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}

/* ===== SHARE / FOOTER ===== */
.foot{padding:30px 22px 40px;text-align:center}
.sharebtn{display:inline-flex;align-items:center;gap:9px;padding:13px 24px;border-radius:100px;
  background:var(--ink);color:#fff;font-size:14.5px;font-weight:700;transition:.15s}
.sharebtn:hover{background:var(--accent)}
.foot .note{margin-top:14px;font-size:12px;color:var(--muted);line-height:1.5}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:100px;font-size:13.5px;font-weight:600;
  z-index:90;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header class="head">
    <div class="eyebrow">Цифровая книга рецептов</div>
    <h1>Вкусно <span class="thin">и по&nbsp;калориям</span></h1>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab on" data-s="ration">Рацион 1400</button>
    <button class="tab" data-s="desserts">Десерты</button>
    <button class="tab" data-s="snacks">Перекусы</button>
    <button class="tab" data-s="lemonades">Лимонады</button>
  </nav>

  <!-- RATION -->
  <section class="section on" id="ration">
    <div class="dayscroll" id="dayscroll"></div>
    <div class="daybar">
      <div class="daynav">
        <button id="prevDay">‹</button>
        <div class="dn"><div class="lab">День</div><div class="num" id="dayNum">1</div></div>
        <button id="nextDay">›</button>
      </div>
    </div>
    <div class="daytotal" id="dayTotal"></div>
    <div class="meallist" id="mealList"></div>
  </section>

  <!-- DESSERTS -->
  <section class="section" id="desserts">
    <p class="intro">Полезные сладости с подсчётом калорий и БЖУ на всю порцию.</p>
    <div class="grid" id="grid_desserts"></div>
  </section>

  <!-- SNACKS -->
  <section class="section" id="snacks">
    <p class="intro">Лёгкие перекусы. Калорийность и БЖУ рассчитаны по ингредиентам.</p>
    <div class="grid" id="grid_snacks"></div>
  </section>

  <!-- LEMONADES -->
  <section class="section" id="lemonades">
    <p class="intro">Освежающие домашние лимонады.</p>
    <div class="grid" id="grid_lemonades"></div>
  </section>

  <footer class="foot">
    <button class="sharebtn" id="shareBtn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Поделиться книгой
    </button>
    <div class="note">Сохраните файл и отправьте подруге —<br>книга работает без интернета.</div>
  </footer>
</div>

<!-- DETAIL MODAL -->
<div class="modal" id="modal">
  <div class="ov" data-close></div>
  <div class="sheet" id="sheet"></div>
</div>

<!-- BASKET BAR -->
<div class="basketbar" id="basketBar">
  <div class="inner">
    <div>
      <div class="bcount" id="bCount">0 блюд</div>
      <div class="bk" id="bKcal">0 <small>ккал</small></div>
      <div class="bmac" id="bMac"></div>
    </div>
    <button class="bview" id="bView">Открыть</button>
  </div>
</div>

<!-- BASKET MODAL -->
<div class="modal" id="bmodal">
  <div class="ov" data-bclose></div>
  <div class="sheet bsheet" id="bsheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA = {
  "ration": [
    {
      "day": 1,
      "meals": [
        {
          "meal": "Завтрак",
          "title": "ЧИЗБУРГЕР В ЛАВАШЕ",
          "kcal": 424, "p": 45.4, "f": 8.5, "c": 40.4,
          "ing": ["1 лист ц/с лаваша (~50 г)", "150 г куриного фарша", "100 г маринованных огурцов", "50 г лука", "100 г помидоров", "2-3 ломтика салата", "40 г сметаны", "10 г томатной пасты", "10 горчицы", "соль, специи"],
          "prep": "фарш обжарить на сковороде до готовности, после этого выложить его на лаваш, сверху выложить измельчённые огурцы, лук, помидоры и листья салата. Со сметаны, томатной пасты и горчицы сделать соус, полить им овощи с мясом, свернуть лаваш, подогреть на сухой сковороде и подавать",
          "img": ""
        },
        {
          "meal": "Обед",
          "title": "ПАСТА С СОУСОМ ПЕСТО",
          "kcal": 568, "p": 49.0, "f": 19.6, "c": 48.1,
          "ing": ["50 г ц/с макарон", "150 г индейки", "150 г помидоров черри", "2 зуб чеснока", "40 г соуса песто", "20 г руколы для подачи", "соль, специи"],
          "prep": "на сковороде обжарить помидоры вместе с чесноком и за минуту до готовности добавить соус песто, смешать овощи с отварными макаронами, туда же добавить руколу, вымешать, сверху выложить индейку, приготовленную любимым способом и подавать",
          "img": ""
        },
        {
          "meal": "Ужин",
          "title": "ОСЕННИЙ Салат С НУТОМ",
          "kcal": 404, "p": 12.5, "f": 14.3, "c": 62.1,
          "ing": ["30 г киноа", "60 г консервированного нута", "100 г тыквы", "50 г винограда", "20 г руколы", "100 г помидоров", "100 г перцев", "10 г горчицы в зёрнах", "10 г масла", "5 г мёда", "соль, специи"],
          "prep": "к отварной киноа добавить консервированный нут, кусочки запечённой тыквы, виноград, руколу, измельчённые помидоры и перец. Из горчицы, масла и мёда сделать соус, заправить им салат и подавать",
          "img": ""
        }
      ],
      "total": { "kcal": 1396, "p": 106.9, "f": 42.4, "c": 150.6 }
    },
    {
      "day": 2,
      "meals": [
        {
          "meal": "Завтрак",
          "title": "ТВОРОЖНЫЕ КЕКСЫ С АНАНАСОМ",
          "kcal": 654, "p": 41.7, "f": 27.1, "c": 58.0,
          "ing": ["100 г к/м творога", "50 г рисовой муки", "1 яйцо", "5 г разрыхлителя", "20 г моцареллы", "100 г ананасов", "20 г орешков для подачи", "подсластитель по желанию"],
          "prep": "к творогу добавить муку, яйцо и разрыхлитель, вымешать до однородности и разлить тесто по формам. Сверху нарезать моцареллу, выложить кусочки ананасов и украсить измельчёнными орешками. Запекать 20-30 мин при 180 и подавать тёплыми",
          "img": ""
        },
        {
          "meal": "Обед",
          "title": "КРЕМ-СУП ИЗ ЧЕЧЕВИЦЫ",
          "kcal": 418, "p": 36.3, "f": 9.4, "c": 47.1,
          "ing": ["50 г красной чечевицы", "50 г картофеля", "50 г моркови", "100 г перца", "50 г лука", "1 зуб чеснока", "100 г лосося", "соль, специи"],
          "prep": "чечевицу замочить на ночь, после чего слить воду и отварить до готовности, картофель и морковь тоже отварить, а из чеснока, лука и перца сделать зажарку, смешать все овощи в чаше блендера и взбить до однородности. Подавать вместе с лососем, приготовленным любимым способом",
          "img": ""
        },
        {
          "meal": "Ужин",
          "title": "ЗАПЕЧЁННЫЙ ТОФУ С ОВОЩАМИ",
          "kcal": 330, "p": 26.2, "f": 14.2, "c": 23.2,
          "ing": ["200 г тофу", "300 г микса овощей для запекания", "50 г соевого соуса", "20 г горчицы", "10 г кунжута", "20 г зелёного лука", "соль, специи"],
          "prep": "тофу замариновать в соевом соусе и горчице, после чего запечь его с овощами 20-30 мин, перед подачей посыпать кунжутом и нарезанным зеленым луком",
          "img": ""
        }
      ],
      "total": { "kcal": 1402, "p": 104.2, "f": 50.7, "c": 128.3 }
    }
  ],
  "desserts": [
    {
      "title": "ПП-БРАУНИ",
      "kcal": 280, "p": 14.2, "f": 8.5, "c": 32.1,
      "ing": ["1 банан", "1 яйцо", "30 г какао", "20 г овсяной муки", "подсластитель"],
      "prep": "Измельчить все ингредиенты блендером до однородности. Выпекать в микроволновке 4-5 минут или в духовке 15 минут при 180 градусах.",
      "img": ""
    }
  ],
  "snacks": [
    {
      "title": "ОВОЩНЫЕ ПАЛОЧКИ С ХУМУСОМ",
      "kcal": 190, "p": 6.1, "f": 7.8, "c": 22.4,
      "ing": ["100 г моркови", "100 г огурца", "50 г готового хумуса"],
      "prep": "Нарезать овощи аккуратной соломкой. Подавать с хумусом в качестве соуса.",
      "img": ""
    }
  ],
  "lemonades": [
    {
      "title": "ЦИТРУСОВЫЙ ЛИМОНАД",
      "kcal": 45, "p": 0.8, "f": 0.2, "c": 11.2,
      "ing": ["1 лимон", "0.5 апельсина", "1 л газированной воды", "мята", "подсластитель"],
      "prep": "Выжать сок из цитрусовых, смешать с водой, добавить подсластитель, мяту и лёд по вкусу.",
      "img": ""
    }
  ]
};

let currentDayIdx = 0;
let basket = [];

function renderRation() {
  const dayData = DATA.ration[currentDayIdx];
  document.getElementById('dayNum').innerText = dayData.day;
  
  document.getElementById('prevDay').disabled = currentDayIdx === 0;
  document.getElementById('nextDay').disabled = currentDayIdx === DATA.ration.length - 1;

  const t = dayData.total;
  document.getElementById('dayTotal').innerHTML = `
    <div class="t1">Итого за день</div>
    <div class="big">${t.kcal} <small>ккал</small></div>
    <div class="mac">
      <div class="lp"><b>${t.p}г</b><span>Белки</span></div>
      <div class="lf"><b>${t.f}г</b><span>Жиры</span></div>
      <div class="lc"><b>${t.c}г</b><span>Угл.</span></div>
    </div>
  `;

  const list = document.getElementById('mealList');
  list.innerHTML = '';
  dayData.meals.forEach((m, idx) => {
    const itemKey = `r_${currentDayIdx}_${idx}`;
    const inB = basket.some(x => x.key === itemKey);
    const div = document.createElement('div');
    div.className = 'mealcard';
    div.innerHTML = `
      <div class="mhead" onclick="this.parentElement.classList.toggle('open')">
        <span class="mtag">${m.meal}</span>
        <div class="mt">
          <h3>${m.title}</h3>
          <div class="mk">${m.kcal} ккал · БЖУ ${m.p}/${m.f}/${m.c}</div>
        </div>
        <div class="chev">›</div>
      </div>
      ${m.img ? `<div class="mimg"><img src="${m.img}"></div>` : ''}
      <div class="mbody">
        <div class="recipe-ing">
          <div class="h">Ингредиенты:</div>
          <ul>${m.ing.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="recipe-prep">
          <div class="h">Приготовление:</div>
          <p>${m.prep}</p>
        </div>
        <button class="add ${inB ? 'in' : ''}" onclick="toggleBasket('${itemKey}','ration',${currentDayIdx},${idx},event)">
          ${inB ? 'Убрать из корзины' : 'Добавить в корзину'}
        </button>
      </div>
    `;
    list.appendChild(div);
  });
}

function renderGrid(section) {
  const grid = document.getElementById(`grid_${section}`);
  if(!grid) return;
  grid.innerHTML = '';
  DATA[section].forEach((m, idx) => {
    const itemKey = `${section}_${idx}`;
    const inB = basket.some(x => x.key === itemKey);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="ph" onclick="openModal('${section}',${idx})">
        ${m.img ? `<img src="${m.img}">` : ''}
      </div>
      <div class="body">
        <h3 onclick="openModal('${section}',${idx})">${m.title}</h3>
        <div class="macros">
          <span class="mp">Б<i>${m.p}</i></span>
          <span class="mf">Ж<i>${m.f}</i></span>
          <span class="mc">У<i>${m.c}</i></span>
        </div>
        <div class="kc"><b>${m.kcal}</b><span>ккал</span></div>
        <button class="add ${inB ? 'in' : ''}" onclick="toggleBasket('${itemKey}','${section}',0,${idx},event)">
          ${inB ? 'Из корзины' : 'В корзину'}
        </button>
      </div>
    `;
    grid.appendChild(div);
  });
}

function renderDayscroll() {
  const scroll = document.getElementById('dayscroll');
  scroll.innerHTML = '';
  DATA.ration.forEach((d, idx) => {
    const btn = document.createElement('button');
    btn.className = `daypill ${idx === currentDayIdx ? 'on' : ''}`;
    btn.innerText = d.day;
    btn.onclick = () => {
      currentDayIdx = idx;
      document.querySelectorAll('.daypill').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      renderRation();
    };
    scroll.appendChild(btn);
  });
}

function toggleBasket(key, type, dIdx, mIdx, e) {
  if(e) e.stopPropagation();
  const idx = basket.findIndex(x => x.key === key);
  if(idx > -1) {
    basket.splice(idx, 1);
    showToast('Удалено из корзины');
  } else {
    let item;
    if(type === 'ration') item = DATA.ration[dIdx].meals[mIdx];
    else item = DATA[type][mIdx];
    basket.push({key, item});
    showToast('Добавлено в корзину');
  }
  updateBasketBar();
  renderRation();
  ['desserts','snacks','lemonades'].forEach(renderGrid);
  if(document.getElementById('bmodal').classList.contains('on')) renderBasketModal();
}

function updateBasketBar() {
  const bar = document.getElementById('basketBar');
  if(basket.length === 0) {
    bar.classList.remove('show');
    return;
  }
  bar.classList.add('show');
  document.getElementById('bCount').innerText = `${basket.length} блюд(а)`;
  
  let k = 0, p = 0, f = 0, c = 0;
  basket.forEach(x => {
    k += x.item.kcal; p += x.item.p; f += x.item.f; c += x.item.c;
  });
  
  document.getElementById('bKcal').innerHTML = `${k} <small>ккал</small>`;
  document.getElementById('bMac').innerHTML = `
    <span class="bp">Б ${p.toFixed(1)}</span> · 
    <span class="bf">Ж ${f.toFixed(1)}</span> · 
    <span class="bc">У ${c.toFixed(1)}</span>
  `;
}

function openModal(type, idx) {
  const m = DATA[type][idx];
  const itemKey = `${type}_${idx}`;
  const inB = basket.some(x => x.key === itemKey);
  const modal = document.getElementById('modal');
  const sheet = document.getElementById('sheet');
  
  sheet.innerHTML = `
    <div class="grab"><i></i></div>
    <button class="close" onclick="closeModal()">×</button>
    ${m.img ? `<div class="dimg"><img src="${m.img}"></div>` : '<div class="dimg"></div>'}
    <div class="dbody">
      <h2>${m.title}</h2>
      <div class="kbju">
        <div class="pill kcal"><b>${m.kcal}</b><span>ккал</span></div>
        <div class="pill pp"><b>${m.p}г</b><span>Белки</span></div>
        <div class="pill pf_"><b>${m.f}г</b><span>Жиры</span></div>
        <div class="pill pc"><b>${m.c}г</b><span>Угл.</span></div>
      </div>
      <div class="recipe-ing">
        <div class="h">Ингредиенты:</div>
        <ul>${m.ing.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
      <div class="recipe-prep">
        <div class="h">Приготовление:</div>
        <p>${m.prep}</p>
      </div>
      <button class="modaladd ${inB ? 'in' : ''}" onclick="toggleBasket('${itemKey}','${type}',0,${idx}); closeModal();">
        ${inB ? 'Убрать из корзины' : 'Добавить в корзину'}
      </button>
    </div>
  `;
  modal.classList.add('on');
}

function closeModal() {
  document.getElementById('modal').classList.remove('on');
}

function renderBasketModal() {
  const sheet = document.getElementById('bsheet');
  if(basket.length === 0) {
    sheet.innerHTML = `
      <div class="grab"><i></i></div>
      <div class="dbody"><button class="close" onclick="closeBasket()">×</button><h2>Корзина</h2><div class="bempty">В корзине пока пусто</div></div>
    `;
    return;
  }
  
  let k = 0, p = 0, f = 0, c = 0;
  let html = `
    <div class="grab"><i></i></div>
    <div class="dbody">
      <button class="close" onclick="closeBasket()">×</button>
      <h2>Корзина</h2>
      <div style="margin-bottom:10px">
  `;
  
  basket.forEach((x, i) => {
    k += x.item.kcal; p += x.item.p; f += x.item.f; c += x.item.c;
    html += `
      <div class="brow">
        <div class="bi">
          <h4>${x.item.title}</h4>
          <span>${x.item.kcal} ккал · ${x.item.p}/${x.item.f}/${x.item.c}</span>
        </div>
        <button class="rm" onclick="removeBasketItem('${x.key}')">×</button>
      </div>
    `;
  });
  
  html += `
      </div>
      <div class="bsum">
        <div class="t1">Суммарный БЖУ выбранного</div>
        <div class="big">${k} <small>ккал</small></div>
        <div class="mac">
          <div class="lp"><b>${p.toFixed(1)}г</b><span>Белки</span></div>
          <div class="lf"><b>${f.toFixed(1)}г</b><span>Жиры</span></div>
          <div class="lc"><b>${c.toFixed(1)}г</b><span>Угл.</span></div>
        </div>
      </div>
      <button class="bclear" onclick="clearBasket()">Очистить всё</button>
    </div>
  `;
  sheet.innerHTML = html;
}

function removeBasketItem(key) {
  const idx = basket.findIndex(x => x.key === key);
  if(idx > -1) basket.splice(idx, 1);
  updateBasketBar();
  renderRation();
  ['desserts','snacks','lemonades'].forEach(renderGrid);
  renderBasketModal();
  if(basket.length === 0) {
    closeBasket();
  }
}

function clearBasket() {
  basket = [];
  updateBasketBar();
  renderRation();
  ['desserts','snacks','lemonades'].forEach(renderGrid);
  closeBasket();
  showToast('Корзина очищена');
}

function closeBasket() {
  document.getElementById('bmodal').classList.remove('on');
}

function showToast(txt) {
  const t = document.getElementById('toast');
  t.innerText = txt;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  document.getElementById(btn.dataset.s).classList.add('on');
});

document.getElementById('prevDay').onclick = () => { if(currentDayIdx > 0) { currentDayIdx--; renderRation(); renderDayscroll(); } };
document.getElementById('nextDay').onclick = () => { if(currentDayIdx < DATA.ration.length-1) { currentDayIdx++; renderRation(); renderDayscroll(); } };
document.getElementById('bView').onclick = () => { document.getElementById('bmodal').classList.add('on'); renderBasketModal(); };
document.querySelector('[data-close]').onclick = closeModal;
document.querySelector('[data-bclose]').onclick = closeBasket;

document.getElementById('shareBtn').onclick = () => {
  if(navigator.share) {
    navigator.share({ title: 'Книга рецептов', url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href);
    showToast('Ссылка скопирована в буфер!');
  }
};

renderDayscroll();
renderRation();
['desserts','snacks','lemonades'].forEach(renderGrid);
</script>
</body>
</html>
